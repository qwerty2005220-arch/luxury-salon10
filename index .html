<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Luxury Salon</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0d0d0d;
  color:white;
}

/* HERO */
.hero {
  height:100vh;
  background:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9') center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1 {
  font-size:50px;
  font-family:'Playfair Display', serif;
}

.btn {
  padding:12px 20px;
  background:gold;
  color:black;
  border-radius:10px;
  text-decoration:none;
  display:inline-block;
  margin:5px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.card {
  background:#1c1c1c;
  border-radius:15px;
  overflow:hidden;
  margin:10px;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

/* WEATHER CARD */
.weather-card {
  width:300px;
  margin:30px auto;
  padding:25px;
  border-radius:20px;
  text-align:center;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  box-shadow:0 0 30px rgba(0,0,0,0.5);
}

/* MOBILE */
@media (max-width: 768px) {
  .grid {grid-template-columns:1fr;}
  .hero h1 {font-size:30px;}
  input, select, .btn {width:90%;}
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>💎 Luxury Salon</h1>
    <a href="#book" class="btn">Жазылу</a>
  </div>
</div>

<!-- SERVICES -->
<h2 style="text-align:center;">Қызметтер</h2>
<div class="grid">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
    <h3>Makeup</h3>
    <p>10 000 ₸</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1526045478516-99145907023c">
    <h3>Hair</h3>
    <p>15 000 ₸</p>
  </div>

  <div class="card">
    <img src="https://i.pinimg.com/736x/b5/0c/cb/b50ccbc5275097daf09e752d2fc71d4b.jpg">
    <h3>Nails</h3>
    <p>8 000 ₸</p>
  </div>
</div>

<!-- NEWS -->
<h2 style="text-align:center;">📰 Жаңалықтар</h2>
<div id="newsList"></div>

<div style="text-align:center;">
  <input id="newsInput" placeholder="Жаңалық жазу">
  <button onclick="addNews()" class="btn">Қосу</button>
</div>

<!-- AI -->
<div style="text-align:center;padding:20px;">
  <h2>🤖 AI стиль</h2>
  <button onclick="aiStyle()" class="btn">Таңдау</button>
  <h3 id="ai"></h3>
</div>

<!-- BOOKING -->
<div id="book" style="text-align:center;padding:30px;">
  <h2>📅 Онлайн запись</h2>
  <input placeholder="Атыңыз"><br>
  <input placeholder="Телефон"><br>

  <select>
    <option>Makeup</option>
    <option>Hair</option>
    <option>Nails</option>
  </select><br>

  <input type="datetime-local"><br>
  <button class="btn" onclick="alert('Жазба қабылданды!')">Жазылу</button>
</div>

<!-- WEATHER -->
<div class="weather-card">
  <h2>🌤 Ауа райы</h2>
  <h3>Qyzylorda</h3>
  <h1 id="temp">+25°C</h1>
  <p id="desc">Күн ашық ☀️</p>
  <button onclick="changeWeather()" class="btn">Жаңарту</button>
</div>

<!-- RATES -->
<div class="weather-card">
  <h2>💱 Валюта</h2>
  <p>USD: 470 ₸</p>
  <p>EUR: 510 ₸</p>
  <p>RUB: 5.2 ₸</p>
</div>

<!-- PAYMENT -->
<div style="text-align:center;padding:30px;">
  <h2>💳 Төлем</h2>

  <a href="#" class="btn" style="background:red;color:white;">Kaspi</a>
  <br><br>
  <a href="#" class="btn" style="background:#25D366;color:white;">WhatsApp</a>
</div>

<script>

/* NEWS */
let news = [
  "💎 Жаңа қызмет қосылды!",
  "🔥 Жеңілдік бар!",
  "🌸 Жаңа мастер келді!"
];

function renderNews() {
  let list = document.getElementById("newsList");
  list.innerHTML = "";
  news.forEach(n => {
    list.innerHTML += `<div class="card"><p style="padding:10px;">${n}</p></div>`;
  });
}

function addNews() {
  let input = document.getElementById("newsInput");
  if(input.value !== "") {
    news.push(input.value);
    input.value = "";
    renderNews();
  }
}

/* AI */
function aiStyle() {
  let styles = ["💄 Soft Glam","🔥 Bold","🌸 Natural","💎 Bridal"];
  let r = styles[Math.floor(Math.random()*styles.length)];
  document.getElementById("ai").innerText = r;
}

/* WEATHER FAKE */
function changeWeather() {
  let temps = ["+25°C","+28°C","+30°C","+22°C"];
  let descs = ["☀️ Күн ашық","⛅ Бұлтты","🌧 Жаңбыр","🌬 Жел"];

  let i = Math.floor(Math.random()*temps.length);

  document.getElementById("temp").innerText = temps[i];
  document.getElementById("desc").innerText = descs[i];
}

/* LOAD */
renderNews();

</script>

</body>
</html>
